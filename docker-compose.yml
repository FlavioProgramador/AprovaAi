version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    container_name: aprovai_db
    restart: always
    environment:
      POSTGRES_USER: aprovai_user
      POSTGRES_PASSWORD: aprovai_password
      POSTGRES_DB: aprovai_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: aprovai_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@aprovai.com
      PGADMIN_DEFAULT_PASSWORD: admin_password
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  pgdata:
    driver: local
