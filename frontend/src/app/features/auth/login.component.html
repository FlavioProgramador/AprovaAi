<div class="min-height-screen flex items-center justify-center p-4 bg-radial-gradient relative overflow-hidden">
  <!-- Glowing decorative orbs -->
  <div class="absolute w-[500px] h-[500px] bg-primary-600/10 rounded-full blur-[120px] top-[-10%] left-[-10%] animate-pulse"></div>
  <div class="absolute w-[400px] h-[400px] bg-accent-500/10 rounded-full blur-[100px] bottom-[-10%] right-[-10%] animate-pulse-slow"></div>

  <div class="w-full max-w-md bg-darkCard/80 backdrop-blur-xl border border-darkBorder/60 rounded-2xl p-8 shadow-2xl shadow-black/40 z-10 transition-all duration-300 transform hover:scale-[1.01]">
    
    <!-- App Logo / Header -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-gradient-to-tr from-primary-600 to-accent-600 mb-3 shadow-lg shadow-primary-600/30">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
        </svg>
      </div>
      <h1 class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-primary-400 via-white to-accent-400 bg-clip-text text-transparent">AprovAI</h1>
      <p class="text-slate-400 mt-2 text-sm">Organize seus estudos de forma estratégica com IA</p>
    </div>

    <!-- Title for the Form -->
    <h2 class="text-xl font-semibold text-white mb-6 text-center">
      {{ isLogin ? 'Entrar na sua Conta' : 'Criar Nova Conta' }}
    </h2>

    <!-- Error message alert -->
    <div *ngIf="errorMsg" class="mb-5 p-3 rounded-lg border border-red-500/20 bg-red-500/10 text-red-200 text-sm flex items-center gap-2 animate-shake">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0 text-red-400" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd" />
      </svg>
      <span>{{ errorMsg }}</span>
    </div>

    <!-- Authentication Form -->
    <form (submit)="onSubmit()" class="space-y-5">
      <div>
        <label for="email" class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">E-mail</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          [(ngModel)]="email" 
          required 
          placeholder="exemplo@email.com"
          class="w-full bg-slate-950/60 border border-darkBorder focus:border-primary-500 focus:ring-1 focus:ring-primary-500 rounded-xl px-4 py-3 text-white placeholder-slate-500 outline-none transition-all duration-200"
        />
      </div>

      <div>
        <label for="password" class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Senha</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          [(ngModel)]="password" 
          required 
          placeholder="••••••••"
          class="w-full bg-slate-950/60 border border-darkBorder focus:border-primary-500 focus:ring-1 focus:ring-primary-500 rounded-xl px-4 py-3 text-white placeholder-slate-500 outline-none transition-all duration-200"
        />
      </div>

      <!-- Confirm Password (Registration only) -->
      <div *ngIf="!isLogin" class="animate-fade-in">
        <label for="confirmPassword" class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Confirmar Senha</label>
        <input 
          type="password" 
          id="confirmPassword" 
          name="confirmPassword" 
          [(ngModel)]="confirmPassword" 
          required 
          placeholder="••••••••"
          class="w-full bg-slate-950/60 border border-darkBorder focus:border-primary-500 focus:ring-1 focus:ring-primary-500 rounded-xl px-4 py-3 text-white placeholder-slate-500 outline-none transition-all duration-200"
        />
      </div>

      <!-- Submit Button -->
      <button 
        type="submit" 
        [disabled]="loading"
        class="w-full py-3.5 px-4 bg-gradient-to-r from-primary-600 to-accent-600 hover:from-primary-500 hover:to-accent-500 active:scale-[0.98] text-white font-medium rounded-xl shadow-lg shadow-primary-600/20 hover:shadow-primary-600/30 transition-all duration-200 flex items-center justify-center gap-2 cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed"
      >
        <span *ngIf="loading" class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
        <span>{{ loading ? 'Processando...' : (isLogin ? 'Entrar' : 'Cadastrar') }}</span>
      </button>
    </form>

    <!-- Toggle Mode Link -->
    <div class="mt-6 text-center text-sm">
      <span class="text-slate-400">{{ isLogin ? 'Ainda não tem conta?' : 'Já possui uma conta?' }}</span>
      <button 
        type="button" 
        (click)="toggleMode()"
        class="ml-1 text-primary-400 hover:text-primary-300 font-semibold focus:outline-none transition-colors duration-150 cursor-pointer"
      >
        {{ isLogin ? 'Crie uma agora' : 'Faça login' }}
      </button>
    </div>

  </div>
</div>
